<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset= "UTF-8">
    <meta name = "viewport" content = "width=device-width, intital-scale=1.0"/>
    <title>MultiChat</title>
    <link rel= "preconnect" href= "https://fonts.googleapis.com">
    <link href= "https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel = "stylesheet" href="/static/style.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>
    <!-- Join Screen -->
    <div id = "join-screen">
        <div class = "join-card">
            <div class = "brand">Mutli<span>Chat</span></div>
            <div class = "subtitle">connect · talk</div>

            <!-- Fields -->
            <div class = "field">
                <label>Username</label>
                <input id="input-user" type = "text" placeholder = "ex. yournamehere" autocomplete = "off" />
            </div>

            <div class = "field">
                <label>Room ID</label>
                <input id="input-room" type = "text" placeholder = "ex. general" autocomplete = "off" />
            </div>

            <div id = "join-error"></div>

            <button class = "btn-join" id="btn-join" onclick = "handleJoin()">Join Room</button>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id = "chat-screen">
        <div class = "chat-header">
            <div class = "header-left">
                <div class = "status-dot"></div>
                <div class = "room-badge" id = "header-room"></div>
                <div class = "user-badge"> as <strong id="header-user"></strong></div>
        </div>
            <button class = "btn-leave" onclick="handleLeave()"> Leave</button>
        </div>
        <div class = "messages-wrap" id = "messages"></div>

        <!-- Input -->
        <div class = "input-bar">
            <input id ="msg-input" type = "text" placeholder = "Type a message" autocomplete = "off"
                   onkeydown = "if(event.key === 'Enter') handleSend()" />
            <button class = "btn-send" onclick = "handleSend()">
                <svg width = "18" height = "18" viewBox = "0 0 24 24" fill= "none" stroke = "currentColor"
                     stroke-width = "2.5" stroke-linecap = "round" stroke-linejoin = "round">
                    <!-- DO NOT DELETE (idk why but the button stops working if modified)-->
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!--scripts-->
    <script src = "/static/client.js"></script>
    <script src = "/static/app.js"></script>

</body>
</html>
